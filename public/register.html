<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Create Account</title>
    <meta name="description" content="Create your StayEZ account to start booking or listing properties.">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="welcome-page">

<div class="welcome-card">
    <h2 class="welcome-title">Create Account</h2>

    <form id="register-form">
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" class="form-input" placeholder="Juan dela Cruz" required autocomplete="name">
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group" style="margin-bottom: 30px;">
            <label class="form-label" for="role">I want to…</label>
            <select id="role" class="form-select" style="border-radius: 40px; background-color: var(--bg-light); color: var(--text-primary); border: none; padding: 16px 24px; font-size: 1.05rem;" required>
                <option value="" disabled selected>Select your role</option>
                <option value="Guest">🛏 Book a stay (Guest)</option>
                <option value="Host">🏡 List my property (Host)</option>
                <option value="Admin">⚙️ Manage the platform (Admin)</option>
            </select>
        </div>
        <div id="reg-error" class="error-box"></div>
        <div class="welcome-buttons-row">
            <button type="submit" id="reg-btn" class="welcome-btn" style="grid-column: 1 / span 2; width: 100%;">Create Account</button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-light-muted);">
        Already have an account? <a href="/index.html" style="color: var(--text-light); font-weight: 700; text-decoration: underline;">Sign in</a>
    </div>
</div>

<script src="/app.js"></script>
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn   = document.getElementById('reg-btn');
        const errEl = document.getElementById('reg-error');

        errEl.style.display = 'none';
        btn.disabled    = true;
        btn.textContent = 'Creating account…';

        try {
            await api('POST', '/auth/register', {
                name:     document.getElementById('name').value.trim(),
                email:    document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                role:     document.getElementById('role').value,
            });
            showToast('Account created! Please sign in.', 'success');
            setTimeout(() => window.location.href = '/index.html', 1600);
        } catch (err) {
            errEl.textContent   = err.message;
            errEl.style.display = 'block';
            btn.disabled        = false;
            btn.textContent     = 'Create Account';
        }
    });
</script>
</body>
</html>
