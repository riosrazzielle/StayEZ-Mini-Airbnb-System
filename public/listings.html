<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Browse Listings</title>
    <meta name="description" content="Browse hotels, apartments, dorms, and guest rooms on StayEZ. Search, filter, and sort to find your perfect stay.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <!-- Hero Header -->
    <div style="text-align:center; padding: 40px 0 20px;">
        <h1 class="page-title">Browse Your <span>Perfect Stay</span></h1>
        <p style="color:var(--text-secondary); margin-top:10px; font-size:1.1rem;">
            Search hotels, apartments, dorms &amp; more across the Philippines
        </p>
    </div>

    <!-- Search Bar -->
    <div class="search-pill-container">
        <input type="text" id="search" class="search-pill-input" placeholder="Browse">
        <span class="search-pill-icon">🔍</span>
    </div>

    <!-- Filter & Sort Buttons -->
    <div class="filter-sort-buttons">
        <button id="filter-toggle" class="btn btn-filter">Filter <span>∨</span></button>
        <button id="sort-toggle" class="btn btn-sort">Sort <span>∨</span></button>
    </div>

    <!-- Filter Dropdown Card -->
    <div id="filter-card" class="filter-dropdown-card">
        <div class="filter-section-title">Location</div>
        <div class="form-group">
            <input type="text" id="filter-location" class="form-input" style="border-radius: 20px; background-color: var(--bg-primary);" placeholder="Search Location...">
        </div>
        <div class="filter-section-title">Type</div>
        <div class="filter-option-list" id="filter-type-list">
            <div class="filter-option" data-value="hotel">Hotel</div>
            <div class="filter-option" data-value="apartment">Apartment</div>
            <div class="filter-option" data-value="dorm">Dorm</div>
            <div class="filter-option" data-value="guest_room">Guest Room</div>
        </div>
    </div>

    <!-- Sort Dropdown Card -->
    <div id="sort-card" class="sort-dropdown-card">
        <button class="sort-btn-option" data-value="price_asc">Ascending</button>
        <button class="sort-btn-option" data-value="price_desc">Descending</button>
    </div>

    <div id="results-info" style="color:var(--text-secondary); font-size:0.95rem; margin-bottom:16px; text-align: center; font-weight: 500;"></div>
    <div id="listings-grid" class="listing-grid">
        <div class="loading"><div class="spinner"></div><span>Loading listings…</span></div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user    = getUser();
    renderNav('/listings.html');

    let selectedType = "";
    let selectedSort = "";

    // Toggle dropdowns
    const filterToggle = document.getElementById('filter-toggle');
    const sortToggle = document.getElementById('sort-toggle');
    const filterCard = document.getElementById('filter-card');
    const sortCard = document.getElementById('sort-card');

    filterToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        filterCard.classList.toggle('open');
        filterToggle.classList.toggle('active');
        sortCard.classList.remove('open');
        sortToggle.classList.remove('active');
    });

    sortToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        sortCard.classList.toggle('open');
        sortToggle.classList.toggle('active');
        filterCard.classList.remove('open');
        filterToggle.classList.remove('active');
    });

    // Close dropdowns when clicking outside
    document.addEventListener('click', (e) => {
        if (!filterCard.contains(e.target) && e.target !== filterToggle) {
            filterCard.classList.remove('open');
            filterToggle.classList.remove('active');
        }
        if (!sortCard.contains(e.target) && e.target !== sortToggle) {
            sortCard.classList.remove('open');
            sortToggle.classList.remove('active');
        }
    });

    async function fetchListings() {
        const search   = document.getElementById('search').value.trim();
        const location = document.getElementById('filter-location').value.trim();

        const params = new URLSearchParams();
        if (search)       params.append('search',   search);
        if (location)     params.append('location', location);
        if (selectedType) params.append('type',     selectedType);
        if (selectedSort) params.append('sort',     selectedSort);

        document.getElementById('listings-grid').innerHTML =
            '<div class="loading"><div class="spinner"></div><span>Searching…</span></div>';

        try {
            const listings = await api('GET', '/listings?' + params.toString());
            renderListings(listings);
        } catch (err) {
            showToast(err.message, 'error');
            document.getElementById('listings-grid').innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Failed to load listings</h3></div>';
        }
    }

    function renderListings(listings) {
        const info = document.getElementById('results-info');
        const grid = document.getElementById('listings-grid');

        info.textContent = `${listings.length} listing${listings.length !== 1 ? 's' : ''} found`;

        if (!listings.length) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">
                    <div class="empty-state-icon">🔍</div>
                    <h3>No listings found</h3>
                    <p>Try adjusting your search or filters</p>
                </div>`;
            return;
        }
        grid.innerHTML = listings.map(l => listingCard(l)).join('');
    }

    // Event wiring
    document.getElementById('search').addEventListener('input', fetchListings);
    document.getElementById('filter-location').addEventListener('input', fetchListings);

    // Type options click selection
    const typeOptions = document.querySelectorAll('#filter-type-list .filter-option');
    typeOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            if (opt.classList.contains('selected')) {
                opt.classList.remove('selected');
                selectedType = "";
            } else {
                typeOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedType = opt.getAttribute('data-value');
            }
            fetchListings();
        });
    });

    // Sort options click selection
    const sortOptions = document.querySelectorAll('#sort-card .sort-btn-option');
    sortOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            if (opt.classList.contains('selected')) {
                opt.classList.remove('selected');
                selectedSort = "";
            } else {
                sortOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedSort = opt.getAttribute('data-value');
            }
            sortCard.classList.remove('open');
            sortToggle.classList.remove('active');
            fetchListings();
        });
    });

    // Initial load
    fetchListings();
</script>
</body>
</html>
