<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — My Bookings</title>
    <meta name="description" content="View and track your booking statuses on StayEZ.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <!-- Back Arrow Navigation -->
    <a href="/index.html" class="back-btn-circle" style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none;">⬅</a>

    <div style="margin-bottom: 32px;">
        <h1 class="page-title">My Bookings</h1>
        <p style="color:var(--text-secondary); margin-top:4px;">Track your reservations — host contact revealed on approval</p>
    </div>

    <div id="bookings-container">
        <div class="loading"><div class="spinner"></div><span>Loading your bookings…</span></div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Guest']);
    if (user) { renderNav('/my-bookings.html'); loadBookings(); }

    async function loadBookings() {
        try {
            const bookings = await api('GET', '/bookings/mine');
            renderBookings(bookings);
        } catch (err) {
            document.getElementById('bookings-container').innerHTML =
                `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${err.message}</h3></div>`;
        }
    }

    function renderBookings(bookings) {
        const container = document.getElementById('bookings-container');

        if (!bookings.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📅</div>
                    <h3>No bookings yet</h3>
                    <p>Browse listings and book your first stay!</p>
                    <a href="/listings.html" class="btn btn-primary" style="margin-top:20px">Browse Listings</a>
                </div>`;
            return;
        }

        container.innerHTML = bookings.map(b => {
            const l           = b.listingId;
            const name        = l ? l.name     : 'Listing Removed';
            const location    = l ? l.location : 'N/A';
            const type        = l ? l.type     : 'N/A';
            const imgSrc      = l && l.image ? l.image : '/images/bedroom-balcony.jpg';
            const isApproved  = b.status === 'approved';

            // Custom Contact Reveal Bar (Mockup 7)
            const contactHtml = isApproved && l && l.contactNumber
                ? `<div class="booking-host-contact-bar">
                       <span style="font-weight: 700; display: inline-flex; align-items: center; gap: 8px;">
                           📞 Host Contact
                       </span>
                       <span style="font-weight: 700; font-family: monospace; letter-spacing: 0.5px;">
                           ${l.contactNumber}
                       </span>
                   </div>`
                : `<div class="booking-host-contact-bar" style="background-color: #5b4c42; opacity: 0.85;">
                       <span style="font-weight: 700; display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.75);">
                           🔒 Host Contact
                       </span>
                       <span style="font-size: 0.85rem; font-style: italic; color: rgba(255,255,255,0.75);">
                           Contact revealed upon approval
                       </span>
                   </div>`;

            return `
                <div class="booking-card">
                    <div class="booking-card-main">
                        <!-- Left image with type ribbon badge -->
                        <div class="booking-img-container">
                            <img src="${imgSrc}"
                                 onerror="this.src='/images/bedroom-balcony.jpg'"
                                 alt="${name}">
                            <span class="ribbon-badge">${type}</span>
                        </div>

                        <!-- Right details -->
                        <div class="booking-content">
                            <div class="booking-header">
                                <h3 class="booking-title">${name}</h3>
                                ${statusBadge(b.status)}
                            </div>
                            <p class="booking-location">📍 ${location}</p>
                            <p class="booking-dates">Dates: ${formatDate(b.startDate)} - ${formatDate(b.endDate)}</p>
                        </div>
                    </div>

                    <!-- Bottom full-width host contact bar -->
                    ${contactHtml}
                </div>`;
        }).join('');
    }
</script>
</body>
</html>
