<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Book a Stay</title>
    <meta name="description" content="Select your check-in and check-out dates to book your stay on StayEZ.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <div id="book-content">
        <div class="loading"><div class="spinner"></div><span>Loading listing details…</span></div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Guest']);

    if (user) {
        renderNav('/listings.html');

        const params    = new URLSearchParams(window.location.search);
        const listingId = params.get('id');

        if (!listingId) {
            document.getElementById('book-content').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">❌</div>
                    <h3>No listing specified</h3>
                    <a href="/listings.html" class="btn btn-primary" style="margin-top:16px">Browse Listings</a>
                </div>`;
        } else {
            loadListing(listingId);
        }
    }

    async function loadListing(id) {
        try {
            const listing = await api('GET', '/listings/' + id);
            renderBookingForm(listing);
        } catch (err) {
            document.getElementById('book-content').innerHTML = `
                <div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${err.message}</h3></div>`;
        }
    }

    function renderBookingForm(listing) {
        const today    = new Date().toISOString().split('T')[0];
        const price    = listing.price ? `₱${Number(listing.price).toLocaleString()}` : 'N/A';
        const imgSrc   = listing.image || '/images/bedroom-balcony.jpg';

        document.getElementById('book-content').innerHTML = `
            <!-- Back Arrow -->
            <button class="back-btn-circle" onclick="window.history.back()">⬅</button>
            
            <div style="margin-bottom: 32px;">
                <h1 class="page-title">Booking</h1>
                <p style="color:var(--text-secondary); margin-top:4px;">Enter your details to reserve your stay and experiences</p>
            </div>

            <div class="book-layout">
                <!-- Left: Listing Preview Info (Mockup 8 Layout) -->
                <div>
                    <img src="${imgSrc}"
                         onerror="this.src='/images/bedroom-balcony.jpg'"
                         alt="${listing.name}"
                         style="width:100%; height:320px; object-fit:cover; border-radius:var(--radius-lg); box-shadow: var(--shadow-soft);">
                    <div style="padding: 24px 0 0;">
                        <h2 style="font-family: var(--font-serif); font-size:2.2rem; font-weight:500; margin-bottom:6px;">${listing.name}</h2>
                        <p style="color:var(--text-secondary); font-size:1.05rem; margin-bottom:4px;">${listing.type}</p>
                        <p style="color:var(--text-secondary); font-size:1.05rem; font-style: italic; margin-bottom:20px;">📍 ${listing.location}</p>
                        <div style="padding-top:16px; border-top:1px solid var(--border-light);">
                            <span style="font-size:1.4rem; font-weight:800; color:var(--accent-teal); text-transform: uppercase; letter-spacing: 0.5px;">
                                ${price} / night
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Right: Dates Selection Card (Mockup 8 Grey Background) -->
                <div class="book-card-container">
                    <h3 style="font-family: var(--font-serif); font-size:1.8rem; font-weight:500; margin-bottom:28px;">Select your dates</h3>
                    <form id="book-form">
                        <div class="form-group">
                            <label class="form-label" for="start-date">START-DATE</label>
                            <input type="date" id="start-date" class="form-input" min="${today}" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 30px;">
                            <label class="form-label" for="end-date">END-DATE</label>
                            <input type="date" id="end-date" class="form-input" min="${today}" required>
                        </div>

                        <!-- Price calculation -->
                        <div style="margin-bottom: 30px;">
                            <h4 id="price-total-display" style="font-size: 1.35rem; font-weight: 700; color: var(--text-primary);">
                                TOTAL: Php 0.00
                            </h4>
                        </div>

                        <div id="book-error" class="error-box"></div>

                        <button type="submit" id="book-btn" class="btn btn-primary btn-full btn-lg" style="border-radius: 30px; letter-spacing: 0.5px;">
                            CONFIRM BOOKING
                        </button>
                    </form>
                </div>
            </div>
        `;

        const pricePerNight = listing.price || 0;

        function recalc() {
            const s = document.getElementById('start-date').value;
            const e = document.getElementById('end-date').value;
            const totalDisplay = document.getElementById('price-total-display');
            if (s && e) {
                const nights = Math.round((new Date(e) - new Date(s)) / 86400000);
                if (nights > 0) {
                    totalDisplay.textContent = `TOTAL: Php ${(pricePerNight * nights).toLocaleString()}`;
                } else {
                    totalDisplay.textContent = `TOTAL: Php 0.00`;
                }
                document.getElementById('end-date').min = s;
            }
        }

        document.getElementById('start-date').addEventListener('change', recalc);
        document.getElementById('end-date').addEventListener('change',   recalc);

        document.getElementById('book-form').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn   = document.getElementById('book-btn');
            const errEl = document.getElementById('book-error');

            errEl.style.display = 'none';
            btn.disabled    = true;
            btn.textContent = 'Booking…';

            try {
                await api('POST', '/bookings', {
                    listingId: listing._id,
                    startDate: document.getElementById('start-date').value,
                    endDate:   document.getElementById('end-date').value,
                });
                showToast('Booking submitted! Awaiting host approval.', 'success');
                setTimeout(() => window.location.href = '/my-bookings.html', 1800);
            } catch (err) {
                errEl.textContent   = err.message;
                errEl.style.display = 'block';
                btn.disabled        = false;
                btn.textContent     = 'CONFIRM BOOKING';
            }
        });
    }
</script>
</body>
</html>
