<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Book a Stay</title>
    <meta name="description" content="Select your check-in and check-out dates to book your stay on StayEZ.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <div id="book-content">
        <div class="loading"><div class="spinner"></div><span>Loading listing details…</span></div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Guest']);

    if (user) {
        renderNav('/book.html');

        const params    = new URLSearchParams(window.location.search);
        const listingId = params.get('id');

        if (!listingId) {
            document.getElementById('book-content').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">❌</div>
                    <h3>No listing specified</h3>
                    <a href="/listings.html" class="btn btn-primary" style="margin-top:16px">Browse Listings</a>
                </div>`;
        } else {
            loadListing(listingId);
        }
    }

    async function loadListing(id) {
        try {
            const listing = await api('GET', '/listings/' + id);
            renderBookingForm(listing);
        } catch (err) {
            document.getElementById('book-content').innerHTML = `
                <div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${err.message}</h3></div>`;
        }
    }

    function renderBookingForm(listing) {
        const today    = new Date().toISOString().split('T')[0];
        const price    = listing.price ? `₱${Number(listing.price).toLocaleString()}` : 'N/A';
        const imgSrc   = listing.image || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600';

        document.getElementById('book-content').innerHTML = `
            <div style="margin-bottom:24px;">
                <a href="/listings.html" style="color:var(--text-secondary);font-size:0.875rem;text-decoration:none;">
                    ← Back to Listings
                </a>
                <h1 class="page-title" style="margin-top:10px;">Book a <span>Stay</span></h1>
            </div>

            <div class="book-grid">
                <!-- ─ Listing Preview ─ -->
                <div class="card" style="padding:0; overflow:hidden;">
                    <img src="${imgSrc}"
                         onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600'"
                         alt="${listing.name}"
                         style="width:100%; height:240px; object-fit:cover;">
                    <div style="padding:24px;">
                        <span class="listing-type-badge inline" style="margin-bottom:12px;">${listing.type}</span>
                        <h2 style="font-size:1.3rem; font-weight:700; margin-bottom:6px;">${listing.name}</h2>
                        <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:12px;">📍 ${listing.location}</p>
                        <p style="color:var(--text-muted); font-size:0.875rem; line-height:1.6; margin-bottom:20px;">${listing.description}</p>
                        <div style="display:flex; align-items:baseline; gap:8px; padding-top:16px; border-top:1px solid var(--border-glass);">
                            <span style="font-size:1.5rem; font-weight:800; color:var(--accent-2);">${price}</span>
                            <span style="color:var(--text-secondary); font-size:0.875rem;">/ night</span>
                        </div>
                    </div>
                </div>

                <!-- ─ Booking Form ─ -->
                <div class="form-card">
                    <h3 style="font-size:1.1rem; font-weight:700; margin-bottom:24px;">📅 Select Your Dates</h3>
                    <form id="book-form">
                        <div class="form-group">
                            <label class="form-label" for="start-date">Check-in Date</label>
                            <input type="date" id="start-date" class="form-input" min="${today}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="end-date">Check-out Date</label>
                            <input type="date" id="end-date" class="form-input" min="${today}" required>
                        </div>

                        <!-- Price summary (shown after dates selected) -->
                        <div id="price-summary" class="price-summary" style="display:none;">
                            <div class="price-row">
                                <span id="nights-label">0 nights</span>
                                <span>${price} / night</span>
                            </div>
                            <div class="price-total">
                                <span>Estimated Total</span>
                                <span id="total-price" style="color:var(--accent-2);">₱0</span>
                            </div>
                        </div>

                        <div id="book-error" class="error-box"></div>

                        <button type="submit" id="book-btn" class="btn btn-primary btn-full btn-lg">
                            Confirm Booking
                        </button>
                        <p style="text-align:center; color:var(--text-muted); font-size:0.78rem; margin-top:12px;">
                            Booking is submitted as <strong>Pending</strong> — the host must approve it.
                        </p>
                    </form>
                </div>
            </div>
        `;

        // ─ Price Calculator ─────────────────────────────────────────────────
        const pricePerNight = listing.price || 0;

        function recalc() {
            const s = document.getElementById('start-date').value;
            const e = document.getElementById('end-date').value;
            const summary = document.getElementById('price-summary');
            if (s && e) {
                const nights = Math.round((new Date(e) - new Date(s)) / 86400000);
                if (nights > 0) {
                    document.getElementById('nights-label').textContent = `${nights} night${nights !== 1 ? 's' : ''}`;
                    document.getElementById('total-price').textContent  = `₱${(pricePerNight * nights).toLocaleString()}`;
                    summary.style.display = 'block';
                } else {
                    summary.style.display = 'none';
                }
                // Ensure end-date min tracks start-date
                document.getElementById('end-date').min = s;
            }
        }

        document.getElementById('start-date').addEventListener('change', recalc);
        document.getElementById('end-date').addEventListener('change',   recalc);

        // ─ Submit ────────────────────────────────────────────────────────────
        document.getElementById('book-form').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn   = document.getElementById('book-btn');
            const errEl = document.getElementById('book-error');

            errEl.style.display = 'none';
            btn.disabled    = true;
            btn.textContent = 'Booking…';

            try {
                await api('POST', '/bookings', {
                    listingId: listing._id,
                    startDate: document.getElementById('start-date').value,
                    endDate:   document.getElementById('end-date').value,
                });
                showToast('Booking submitted! Awaiting host approval.', 'success');
                setTimeout(() => window.location.href = '/my-bookings.html', 1800);
            } catch (err) {
                errEl.textContent   = err.message;
                errEl.style.display = 'block';
                btn.disabled        = false;
                btn.textContent     = 'Confirm Booking';
            }
        });
    }
</script>
</body>
</html>
