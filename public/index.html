<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Login</title>
    <meta name="description" content="Login to StayEZ, your mini Airbnb platform for finding and booking the perfect stay.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>🏠 StayEZ</h1>
            <p>Your home away from home</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div id="login-error" class="error-box"></div>
            <button type="submit" id="login-btn" class="btn btn-primary btn-full btn-lg">Sign In</button>
        </form>

        <div class="auth-switch">
            Don't have an account? <a href="/register.html">Create one</a>
        </div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    // Redirect if already logged in
    const existing = getUser();
    if (existing) {
        window.location.href =
            existing.role === 'Guest' ? '/listings.html' :
            existing.role === 'Host'  ? '/host-listings.html' : '/admin-listings.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn   = document.getElementById('login-btn');
        const errEl = document.getElementById('login-error');

        errEl.style.display = 'none';
        btn.disabled    = true;
        btn.textContent = 'Signing in…';

        try {
            const user = await api('POST', '/auth/login', {
                email:    document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
            });
            saveUser(user);
            window.location.href =
                user.role === 'Guest' ? '/listings.html' :
                user.role === 'Host'  ? '/host-listings.html' : '/admin-listings.html';
        } catch (err) {
            errEl.textContent    = err.message;
            errEl.style.display  = 'block';
            btn.disabled         = false;
            btn.textContent      = 'Sign In';
        }
    });
</script>
</body>
</html>
