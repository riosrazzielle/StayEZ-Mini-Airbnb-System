<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Booking Requests</title>
    <meta name="description" content="Approve or reject guest booking requests for your listings on StayEZ.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <div style="margin-bottom: 32px;">
        <h1 class="page-title">Booking Requests</h1>
        <p style="color:var(--text-secondary); margin-top:4px;">Approve or reject guest bookings for your properties</p>
    </div>

    <!-- Redesigned Listing Selector & Stats Row (Mockup 15) -->
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 36px;">
        <div style="display: flex; align-items: center; gap: 12px; flex-grow: 1;">
            <label style="color:var(--text-primary); font-size:1.05rem; font-family: var(--font-serif); font-weight:500; white-space:nowrap;">
                Viewing requests for:
            </label>
            <select id="listing-select" class="form-select" style="max-width: 320px; border-radius: 20px; background-color: var(--bg-secondary); border: 1px solid var(--text-primary); font-family: var(--font-sans); font-weight: 600;">
                <option value="">-- Select Listing --</option>
            </select>
        </div>

        <!-- Dynamic Stat badges (Mockup 15) -->
        <div class="requests-stats-bar" id="requests-stats">
            <span class="requests-stat-pill total">0 Total</span>
            <span class="requests-stat-pill approved">0 Approved</span>
            <span class="requests-stat-pill pending">0 Pending</span>
            <span class="requests-stat-pill rejected">0 Rejected</span>
        </div>
    </div>

    <div id="bookings-container">
        <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <h3>Select a listing above to view its booking requests</h3>
        </div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Host']);
    if (user) { renderNav('/host-bookings.html'); init(); }

    let currentListing = null;

    async function init() {
        try {
            const listings = await api('GET', '/listings/host');
            const select   = document.getElementById('listing-select');

            if (!listings.length) {
                document.getElementById('bookings-container').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏡</div>
                        <h3>You have no listings yet</h3>
                        <a href="/host-listings.html" class="btn btn-primary" style="margin-top:16px">Create a Listing</a>
                    </div>`;
                return;
            }

            listings.forEach(l => {
                const opt = document.createElement('option');
                opt.value       = l._id;
                opt.textContent = l.name;
                select.appendChild(opt);
            });

            const urlParams  = new URLSearchParams(window.location.search);
            const preselect  = urlParams.get('listing');
            if (preselect) {
                select.value = preselect;
                currentListing = listings.find(l => l._id === preselect);
                loadBookings(preselect);
            }

            select.addEventListener('change', () => {
                if (select.value) {
                    currentListing = listings.find(l => l._id === select.value);
                    loadBookings(select.value);
                } else {
                    currentListing = null;
                    resetStats();
                    document.getElementById('bookings-container').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <h3>Select a listing above to view its booking requests</h3>
                        </div>`;
                }
            });
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    function resetStats() {
        document.getElementById('requests-stats').innerHTML = `
            <span class="requests-stat-pill total">0 Total</span>
            <span class="requests-stat-pill approved">0 Approved</span>
            <span class="requests-stat-pill pending">0 Pending</span>
            <span class="requests-stat-pill rejected">0 Rejected</span>
        `;
    }

    async function loadBookings(listingId) {
        document.getElementById('bookings-container').innerHTML =
            '<div class="loading"><div class="spinner"></div><span>Loading requests…</span></div>';
        try {
            const bookings = await api('GET', '/bookings/listing/' + listingId);
            renderStatsAndBookings(bookings);
        } catch (err) {
            document.getElementById('bookings-container').innerHTML =
                `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${err.message}</h3></div>`;
        }
    }

    function renderStatsAndBookings(bookings) {
        const container = document.getElementById('bookings-container');
        
        const pending  = bookings.filter(b => b.status === 'pending').length;
        const approved = bookings.filter(b => b.status === 'approved').length;
        const rejected = bookings.filter(b => b.status === 'rejected').length;

        // Render Stats Bar
        document.getElementById('requests-stats').innerHTML = `
            <span class="requests-stat-pill total">${bookings.length} Total</span>
            <span class="requests-stat-pill approved">${approved} Approved</span>
            <span class="requests-stat-pill pending">${pending} Pending</span>
            <span class="requests-stat-pill rejected">${rejected} Rejected</span>
        `;

        if (!bookings.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <h3>No booking requests yet</h3>
                    <p>Guests will appear here once they request your listing.</p>
                </div>`;
            return;
        }

        // Render Request Cards (Mockup 15)
        const listingImgSrc = currentListing && currentListing.image ? currentListing.image : '/images/bedroom-balcony.jpg';
        const listingType = currentListing ? currentListing.type : 'Type';

        container.innerHTML = bookings.map(b => {
            const guestName = b.guestId ? b.guestId.name : 'N/A';
            const guestEmail = b.guestId ? b.guestId.email : '—';
            const isPending = b.status === 'pending';
            const isApproved = b.status === 'approved';

            let actionButtonsHtml = '';
            if (isPending) {
                actionButtonsHtml = `
                    <button onclick="updateStatus('${b._id}', 'approved')" class="btn btn-success btn-sm" id="approve-${b._id}">✓ Approve</button>
                    <button onclick="updateStatus('${b._id}', 'rejected')" class="btn btn-danger btn-sm" id="reject-${b._id}">✕ Reject</button>
                `;
            } else if (isApproved) {
                actionButtonsHtml = `
                    <button class="btn btn-success btn-sm" disabled style="opacity: 0.9;">✓ Approve</button>
                    <button class="btn btn-secondary btn-sm" disabled style="opacity: 0.4;">✕ Reject</button>
                `;
            } else {
                actionButtonsHtml = `
                    <button class="btn btn-secondary btn-sm" disabled style="opacity: 0.4;">✓ Approve</button>
                    <button class="btn btn-danger btn-sm" disabled style="opacity: 0.9;">✕ Reject</button>
                `;
            }

            return `
                <div class="request-card" id="card-${b._id}">
                    <div class="request-card-content">
                        <!-- Left Image with type ribbon badge -->
                        <div class="booking-img-container">
                            <img src="${listingImgSrc}" onerror="this.src='/images/bedroom-balcony.jpg'">
                            <span class="ribbon-badge">${listingType}</span>
                        </div>

                        <!-- Right details -->
                        <div class="request-card-info">
                            <div class="request-title-row">
                                <h3 style="font-family: var(--font-serif); font-size: 1.6rem; font-weight: 500;">
                                    ${currentListing ? currentListing.name : 'Listing'}
                                </h3>
                                ${statusBadge(b.status)}
                            </div>
                            
                            <p style="font-size:0.9rem; color:var(--text-light-muted); margin-bottom: 2px;">
                                📍 ${currentListing ? currentListing.location : 'Location'} | 📅 ${formatDate(b.startDate)} - ${formatDate(b.endDate)}
                            </p>
                            
                            <!-- Guest Name and Email row -->
                            <div class="request-guest-name">
                                <span style="font-size: 1.1rem;">👤</span> 
                                <span style="font-weight: 700; color: var(--text-light);">${guestName}</span>
                                <span style="margin-left: 6px; font-size: 0.85rem; color: var(--text-light-muted);">(${guestEmail})</span>
                            </div>

                            <div class="request-actions">
                                ${actionButtonsHtml}
                            </div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    async function updateStatus(bookingId, status) {
        const approveBtn = document.getElementById('approve-' + bookingId);
        const rejectBtn  = document.getElementById('reject-'  + bookingId);
        if (approveBtn) approveBtn.disabled = true;
        if (rejectBtn)  rejectBtn.disabled  = true;

        try {
            await api('PUT', `/bookings/${bookingId}/status`, { status });
            showToast(
                status === 'approved' ? '✓ Booking approved!' : '✕ Booking rejected.',
                status === 'approved' ? 'success' : 'info'
            );
            loadBookings(document.getElementById('listing-select').value);
        } catch (err) {
            showToast(err.message, 'error');
            if (approveBtn) approveBtn.disabled = false;
            if (rejectBtn)  rejectBtn.disabled  = false;
        }
    }
</script>
</body>
</html>
