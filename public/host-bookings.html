<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Booking Requests</title>
    <meta name="description" content="Approve or reject guest booking requests for your listings on StayEZ.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Booking <span>Requests</span></h1>
            <p style="color:var(--text-secondary); margin-top:4px;">Approve or reject guest bookings for your properties</p>
        </div>
        <a href="/host-listings.html" class="btn btn-outline">← My Listings</a>
    </div>

    <!-- Listing Selector -->
    <div class="filter-bar">
        <label style="color:var(--text-secondary); font-size:0.875rem; white-space:nowrap; font-weight:600;">
            Viewing requests for:
        </label>
        <select id="listing-select" class="form-select" style="flex:1; max-width:400px;">
            <option value="">— Select a listing —</option>
        </select>
    </div>

    <div id="bookings-container">
        <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <h3>Select a listing above to view its booking requests</h3>
        </div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Host']);
    if (user) { renderNav('/host-bookings.html'); init(); }

    async function init() {
        try {
            const listings = await api('GET', '/listings/host');
            const select   = document.getElementById('listing-select');

            if (!listings.length) {
                document.getElementById('bookings-container').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏡</div>
                        <h3>You have no listings yet</h3>
                        <a href="/host-listings.html" class="btn btn-primary" style="margin-top:16px">Create a Listing</a>
                    </div>`;
                return;
            }

            listings.forEach(l => {
                const opt = document.createElement('option');
                opt.value       = l._id;
                opt.textContent = l.name;
                select.appendChild(opt);
            });

            // Auto-select from URL param
            const urlParams  = new URLSearchParams(window.location.search);
            const preselect  = urlParams.get('listing');
            if (preselect) {
                select.value = preselect;
                loadBookings(preselect);
            }

            select.addEventListener('change', () => {
                if (select.value) loadBookings(select.value);
            });
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    async function loadBookings(listingId) {
        document.getElementById('bookings-container').innerHTML =
            '<div class="loading"><div class="spinner"></div><span>Loading requests…</span></div>';
        try {
            const bookings = await api('GET', '/bookings/listing/' + listingId);
            renderBookings(bookings);
        } catch (err) {
            document.getElementById('bookings-container').innerHTML =
                `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${err.message}</h3></div>`;
        }
    }

    function renderBookings(bookings) {
        const container = document.getElementById('bookings-container');
        if (!bookings.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <h3>No booking requests yet</h3>
                    <p>Guests will appear here once they request your listing.</p>
                </div>`;
            return;
        }

        // Stats mini-bar
        const pending  = bookings.filter(b => b.status === 'pending').length;
        const approved = bookings.filter(b => b.status === 'approved').length;
        const rejected = bookings.filter(b => b.status === 'rejected').length;

        container.innerHTML = `
            <div style="display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
                <div style="padding:10px 18px; background:var(--bg-glass); border:1px solid var(--border-glass); border-radius:var(--radius-sm); font-size:0.875rem;">
                    <span style="font-weight:700;">${bookings.length}</span> <span style="color:var(--text-secondary);">Total</span>
                </div>
                <div style="padding:10px 18px; background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.25); border-radius:var(--radius-sm); font-size:0.875rem;">
                    <span style="font-weight:700; color:var(--warning);">${pending}</span> <span style="color:var(--text-secondary);">Pending</span>
                </div>
                <div style="padding:10px 18px; background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.25); border-radius:var(--radius-sm); font-size:0.875rem;">
                    <span style="font-weight:700; color:var(--success);">${approved}</span> <span style="color:var(--text-secondary);">Approved</span>
                </div>
                <div style="padding:10px 18px; background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.25); border-radius:var(--radius-sm); font-size:0.875rem;">
                    <span style="font-weight:700; color:var(--danger);">${rejected}</span> <span style="color:var(--text-secondary);">Rejected</span>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Guest</th>
                            <th>Email</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bookings.map(b => `
                            <tr id="row-${b._id}">
                                <td><strong>${b.guestId ? b.guestId.name : 'N/A'}</strong></td>
                                <td style="color:var(--text-secondary);">${b.guestId ? b.guestId.email : '—'}</td>
                                <td>${formatDate(b.startDate)}</td>
                                <td>${formatDate(b.endDate)}</td>
                                <td>${statusBadge(b.status)}</td>
                                <td>
                                    ${b.status === 'pending'
                                        ? `<div style="display:flex; gap:6px;">
                                               <button onclick="updateStatus('${b._id}', 'approved')"
                                                       class="btn btn-success btn-sm" id="approve-${b._id}">✓ Approve</button>
                                               <button onclick="updateStatus('${b._id}', 'rejected')"
                                                       class="btn btn-danger btn-sm"  id="reject-${b._id}">✕ Reject</button>
                                           </div>`
                                        : `<span style="color:var(--text-muted); font-size:0.8rem;">—</span>`
                                    }
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
    }

    async function updateStatus(bookingId, status) {
        // Disable buttons for this row immediately
        const approveBtn = document.getElementById('approve-' + bookingId);
        const rejectBtn  = document.getElementById('reject-'  + bookingId);
        if (approveBtn) approveBtn.disabled = true;
        if (rejectBtn)  rejectBtn.disabled  = true;

        try {
            await api('PUT', `/bookings/${bookingId}/status`, { status });
            showToast(
                status === 'approved' ? '✓ Booking approved!' : '✕ Booking rejected.',
                status === 'approved' ? 'success' : 'info'
            );
            // Reload the current listing's bookings
            const listingId = document.getElementById('listing-select').value;
            loadBookings(listingId);
        } catch (err) {
            showToast(err.message, 'error');
            if (approveBtn) approveBtn.disabled = false;
            if (rejectBtn)  rejectBtn.disabled  = false;
        }
    }
</script>
</body>
</html>
