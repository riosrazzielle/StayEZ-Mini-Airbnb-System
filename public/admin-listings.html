<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — All Listings (Admin)</title>
    <meta name="description" content="Administrator view of all listings on StayEZ. Search, filter, and delete any listing.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <div style="margin-align: center; text-align: center; margin-bottom: 40px;">
        <h1 class="page-title" style="font-size: 2.6rem;">All Listings</h1>
        <p style="color:var(--text-secondary); margin-top:6px; font-size: 1.05rem;">Manage Listings of the whole system</p>
    </div>

    <!-- Redesigned Search & Filter Header (Mockup 16) -->
    <div style="display: flex; align-items: center; justify-content: flex-end; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;">
        <div class="search-pill-container" style="margin: 0; max-width: 320px; flex-grow: 1;">
            <input type="text" id="search" class="search-pill-input" placeholder="Search Listings..." style="padding: 12px 40px 12px 20px; font-size: 0.95rem;">
            <span class="search-pill-icon">🔍</span>
        </div>
        <button id="filter-toggle" class="btn btn-filter" style="font-size: 0.95rem; padding: 10px 24px; min-width: auto; border-radius: 20px;">Filter <span>∨</span></button>
    </div>

    <!-- Filter Dropdown Card -->
    <div id="filter-card" class="filter-dropdown-card" style="margin: -14px 0 24px auto;">
        <div class="filter-section-title">Location</div>
        <div class="form-group">
            <input type="text" id="filter-location" class="form-input" style="border-radius: 20px; background-color: var(--bg-primary);" placeholder="Search Location...">
        </div>
        <div class="filter-section-title">Type</div>
        <div class="filter-option-list" id="filter-type-list">
            <div class="filter-option" data-value="hotel">Hotel</div>
            <div class="filter-option" data-value="apartment">Apartment</div>
            <div class="filter-option" data-value="dorm">Dorm</div>
            <div class="filter-option" data-value="guest_room">Guest Room</div>
        </div>
    </div>

    <div id="count" style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:12px; font-weight: 600;"></div>

    <div id="listings-container">
        <div class="loading"><div class="spinner"></div><span>Loading all listings…</span></div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Admin']);
    if (user) { renderNav('/admin-listings.html'); fetchListings(); }

    let selectedType = "";

    // Toggle Filter card
    const filterToggle = document.getElementById('filter-toggle');
    const filterCard = document.getElementById('filter-card');

    filterToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        filterCard.classList.toggle('open');
        filterToggle.classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
        if (!filterCard.contains(e.target) && e.target !== filterToggle) {
            filterCard.classList.remove('open');
            filterToggle.classList.remove('active');
        }
    });

    async function fetchListings() {
        const search   = document.getElementById('search').value.trim();
        const location = document.getElementById('filter-location').value.trim();

        const params = new URLSearchParams();
        if (search)       params.append('search',   search);
        if (location)     params.append('location', location);
        if (selectedType) params.append('type',     selectedType);

        document.getElementById('listings-container').innerHTML =
            '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';

        try {
            const listings = await api('GET', '/listings?' + params);
            document.getElementById('count').textContent =
                `${listings.length} listing${listings.length !== 1 ? 's' : ''} found`;
            renderListings(listings);
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    function renderListings(listings) {
        const c = document.getElementById('listings-container');
        if (!listings.length) {
            c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏠</div><h3>No listings found</h3></div>';
            return;
        }

        c.innerHTML = `
            <div class="table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Host</th>
                            <th>Location</th>
                            <th>Type</th>
                            <th>Price/night</th>
                            <th style="width: 60px; text-align: center;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${listings.map(l => {
                            const hostName = l.hostId ? l.hostId.name : 'Unknown';
                            return `
                            <tr>
                                <td><strong>${l.name}</strong></td>
                                <td>${hostName}</td>
                                <td style="color:var(--text-secondary);">📍 ${l.location}</td>
                                <td><span style="font-weight:600; text-transform:capitalize;">${l.type.replace('_',' ')}</span></td>
                                <td style="font-weight:700;">₱${Number(l.price).toLocaleString()}</td>
                                <td style="text-align: center;">
                                    <button onclick="deleteListing('${l._id}')" class="admin-delete-btn" title="Delete Listing">❌</button>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>`;
    }

    async function deleteListing(id) {
        if (!confirm('Permanently delete this listing? This cannot be undone.')) return;
        try {
            await api('DELETE', '/listings/' + id);
            showToast('Listing deleted successfully.', 'success');
            fetchListings();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    // Wiring events
    document.getElementById('search').addEventListener('input', fetchListings);
    document.getElementById('filter-location').addEventListener('input', fetchListings);

    const typeOptions = document.querySelectorAll('#filter-type-list .filter-option');
    typeOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            if (opt.classList.contains('selected')) {
                opt.classList.remove('selected');
                selectedType = "";
            } else {
                typeOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedType = opt.getAttribute('data-value');
            }
            fetchListings();
        });
    });
</script>
</body>
</html>
